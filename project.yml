name: WatchNotify
options:
  deploymentTarget:
    watchOS: "10.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.sgn1.watchnotify
    SWIFT_VERSION: 5.9
targets:
  WatchNotify:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources/WatchNotify
    info:
      path: Sources/WatchNotify/Info.plist
      properties:
        CFBundleDisplayName: WatchNotify
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSSupportsLiveActivities: false
