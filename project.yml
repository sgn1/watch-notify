name: WatchNotify
options:
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  PhoneNotify:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sgn1.phonenotify
        INFOPLIST_FILE: Sources/iOSApp/Info.plist
    sources:
      - Sources/Shared
      - Sources/iOSApp

  WatchNotify:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sgn1.watchnotify
        INFOPLIST_FILE: Sources/WatchApp/Info.plist
    sources:
      - Sources/Shared
      - Sources/WatchApp
